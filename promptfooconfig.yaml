description: AWS benchmark MCQ evaluation

prompts:
  - file://prompt.txt

providers:
  - id: openrouter:openai/gpt-5.4-mini
    config:
      temperature: 0
      max_tokens: 128

  - id: openrouter:google/gemini-3-flash-preview
    config:
      temperature: 0
      max_tokens: 128  # let it finish thinking, answer comes at the end

  - id: openrouter:deepseek/deepseek-chat-v3.1
    config:
      temperature: 0
      max_tokens: 128

tests:
  - file://aws_promptfoo_questions.yaml

defaultTest:
  assert:
    - type: javascript
      value: |
        // Gemini thinks for a long time then outputs the letter last
        // Extract the LAST A-D letter in the output
        const matches = output.match(/[A-D]/g);
        const letter = matches ? matches[matches.length - 1] : null;
        return letter === context.vars.answer;